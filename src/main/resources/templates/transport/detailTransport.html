<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Route Detail</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

    <style>
        :root {
            --main:#3b9eff;
            --border:#dbeafe;
            --gray:#64748b;
        }
        body { font-family:'DM Sans'; margin:0; }

        .section { padding:40px; }
        .container { max-width:1100px; margin:auto; }

        .card {
            border:1px solid var(--border);
            border-radius:12px;
            padding:20px;
            margin-bottom:20px;
        }

        .badge {
            display:inline-block;
            padding:6px 12px;
            border-radius:20px;
            background:#eff6ff;
            color:#1a7de0;
            font-weight:600;
            margin-bottom:10px;
        }

        .grid {
            display:grid;
            grid-template-columns: repeat(3,1fr);
            gap:20px;
        }

        .map {
            height:400px;
            border-radius:12px;
            border:1px solid var(--border);
        }

        .step {
            padding:14px;
            border:1px solid var(--border);
            border-radius:10px;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

<!-- 1. 경로 타입 -->
<section class="section">
    <div class="container">

        <div class="card">

            <!-- 경로 타입 -->
            <div class="badge" id="routeType">🚀 최단 경로</div>

            <!-- 출발 도착 -->
            <div id="routeTitle" style="font-size:20px; font-weight:600;">
                서울역 → 강남역
            </div>

        </div>

    </div>
</section>

<!-- 2. 요약 정보 -->
<section class="section">
    <div class="container">

        <div class="grid">

            <div class="card">
                <div>소요 시간</div>
                <b id="time">30분</b>
            </div>

            <div class="card">
                <div>환승</div>
                <b id="transfer">1회</b>
            </div>

            <div class="card">
                <div>요금</div>
                <b id="price">1250원</b>
            </div>

        </div>

    </div>
</section>

<!-- 3. 지도 -->
<section class="section">
    <div class="container">

        <h3>지도</h3>
        <div id="map" class="map"></div>

    </div>
</section>

<!-- 4. 이동 단계 -->
<section class="section">
    <div class="container">

        <h3>이동 단계</h3>

        <div id="steps">

            <div class="step">🚇 2호선 탑승</div>
            <div class="step">📍 홍대입구 하차</div>
            <div class="step">🚶 도보 이동</div>

        </div>

    </div>
</section>

<!-- 5. 혼잡도 -->
<section class="section">
    <div class="container">

        <h3>혼잡도</h3>

        <div class="card">
            <b id="congestion">혼잡</b>
        </div>

    </div>
</section>

<!-- Kakao Map -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KEY"></script>

<script>
    // =========================
    // 🔥 데이터 받아왔다고 가정
    // =========================

    const data = {
        type: "fast", // fast / transfer / cheap
        start: "서울역",
        end: "강남역",
        time: 30,
        transfer: 1,
        price: 1250,
        steps: [
            "🚇 2호선 탑승",
            "📍 홍대입구 하차",
            "🚶 도보 이동"
        ],
        coords: [
            {lat:37.55, lng:126.97},
            {lat:37.56, lng:126.99}
        ]
    };

    // =========================
    // UI 적용
    // =========================

    // 타입 표시
    const typeMap = {
        fast: "🚀 최단 경로",
        transfer: "🔄 최소 환승",
        cheap: "💰 저렴한 경로"
    };

    document.getElementById("routeType").innerText = typeMap[data.type];
    document.getElementById("routeTitle").innerText = data.start + " → " + data.end;
    document.getElementById("time").innerText = data.time + "분";
    document.getElementById("transfer").innerText = data.transfer + "회";
    document.getElementById("price").innerText = data.price + "원";

    // 단계
    let stepHtml = "";
    data.steps.forEach(s => {
        stepHtml += `<div class="step">${s}</div>`;
    });
    document.getElementById("steps").innerHTML = stepHtml;

    // 혼잡도
    const hour = new Date().getHours();
    let congestion = "여유";
    if(hour >= 7 && hour <= 9) congestion = "혼잡";
    document.getElementById("congestion").innerText = congestion;

    // =========================
    // 지도
    // =========================
    var map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(37.5665,126.9780),
        level: 5
    });

    // 마커
    data.coords.forEach(c => {
        new kakao.maps.Marker({
            map: map,
            position: new kakao.maps.LatLng(c.lat, c.lng)
        });
    });

</script>

</body>
</html>
