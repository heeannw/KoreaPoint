<script>

    // =========================
    // 0. URL 값
    // =========================
    const urlParams = new URLSearchParams(window.location.search);
    const start = urlParams.get("start");
    const end = urlParams.get("end");

    // =========================
    // 1. 지도 생성 (딱 1번만)
    // =========================
    var map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 5
    });

    // =========================
    // 2. 경로 API
    // =========================
    fetch(`/api/route?start=${start}&end=${end}`)
        .then(res => res.json())
        .then(data => {

            const route = data.routes[0];

            let linePath = [];
            let lastStation = "";

            route.steps.forEach(step => {

                // 좌표
                if (step.path && step.path.length > 0) {
                    step.path.forEach(p => {
                        linePath.push(new kakao.maps.LatLng(p.lat, p.lng));
                    });
                }

                // 마지막 지하철역
                if (step.type === "subway" && step.to_station) {
                    lastStation = step.to_station;
                }
            });

            // =========================
            // 3. 지도 경로
            // =========================
            var polyline = new kakao.maps.Polyline({
                path: linePath,
                strokeWeight: 5,
                strokeColor: '#FF0000',
                strokeOpacity: 0.7
            });

            polyline.setMap(map);

            map.setCenter(linePath[0]);

            // =========================
            // 4. 도착정보
            // =========================
            fetch(`/api/subway?station=${lastStation}`)
                .then(res => res.json())
                .then(data => {

                    const list = data.realtimeArrivalList || [];
                    let html = "";

                    if (list.length === 0) {
                        html = "도착 정보 없음";
                    } else {
                        list.forEach(item => {
                            html += `
                                <div class="card">
                                    <b>${item.trainLineNm}</b><br>
                                    ${item.arvlMsg2}
                                </div>
                            `;
                        });
                    }

                    document.getElementById("arrivalBox").innerHTML = html;
                });

        });

</script>
